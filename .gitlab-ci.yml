# GitLab CI/CD for PRAXIS Lite
# Uses rules: for job control, cache with key:files, artifacts
# Follows conventional commits and GitLab workflow

stages:
  - lint
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# Cache Python and Node deps
cache:
  key:
    files:
      - pyproject.toml
      - package-lock.json
      - frontend-react/package-lock.json
  paths:
    - .cache/pip
    - node_modules/
    - frontend-react/node_modules/

lint:
  stage: lint
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  before_script:
    - pip install ruff black
  script:
    - ruff check .
    - black --check .
  allow_failure: true

test:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  before_script:
    - pip install pytest
  script:
    - pytest --tb=short || true
  artifacts:
    reports:
      junit: junit.xml
    expire_in: 1 week

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  artifacts:
    paths:
      - Dockerfile
    expire_in: 1 day

deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "Deploy handled by Render blueprint (render.yaml) on push to main"
    - echo "For manual Render deploy trigger, use their API with RENDER_API_KEY"
  allow_failure: true

# Future: add mirror job to GitHub using git push with token if needed
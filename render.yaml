# Render Blueprint for PRAXIS Lite
# https://render.com/docs/blueprint-spec
# Note: Render only supports GitHub, GitLab.com, Bitbucket (not self-hosted GitLab)
# Using GitHub mirror for Render deployments
# Primary: GitLab https://labs.gauntletai.com/monicapeters/praxis-lite
# Mirror: https://github.com/monigarr/praxis-lite

services:
  # Static site: React 19 + Vite human-gate dashboard at praxis-lite.onrender.com
  - type: web
    name: praxis-lite
    rootDir: frontend-react
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    branch: main
    repo: https://github.com/monigarr/praxis-lite
    envVars:
      - key: VITE_PRAXIS_API_BASE_URL
        sync: false
      - key: VITE_PRAXIS_API_TOKEN
        sync: false
      - key: VITE_PRAXIS_ORG_ID
        value: default
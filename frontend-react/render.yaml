services:
  - type: web
    name: praxis-dashboard
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_PRAXIS_API_BASE_URL
        sync: false
      - key: VITE_PRAXIS_API_TOKEN
        sync: false
      - key: VITE_PRAXIS_ORG_ID
        value: default
